<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sumo-Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SUMO EXPLORER</h1>
        <p>Recherchez un lutteur (Rikishi) par son nom.</p>
    </header>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="sumoInput" placeholder="Ex: Hakuho, Terunofuji...">
            <button id="searchBtn" disabled>🔎</button>
            <button id="favBtn" disabled>☆</button>
        </div>

        <div class="content">
            <section id="result-section">
                <div id="loader" class="hidden">Chargement du lutteur...</div>
                <div id="sumoCard">
                    </div>
            </section>

            <aside id="favorites-section">
                <h3>Rikishi Favoris</h3>
                <ul id="favList"></ul>
                <p id="noFav"> (Ø Aucun favori) </p>
            </aside>
        </div>
    </main>

    <script type="module" src="js/Controleur/main.js"></script>
</body>
</html>
